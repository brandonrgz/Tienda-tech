<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tienda Tech Premium 5.0</title>
<meta name="description" content="Tienda Tech Premium - Compra accesorios tecnológicos de calidad">
<meta name="keywords" content="tech, tienda, accesorios, Apple, USB, microSD">
<meta name="author" content="Tienda Tech Premium">
<link rel="icon" href="favicon.ico">
<style>
/* ---------- VARIABLES CSS ---------- */
:root {
  --primary-color: #0071e3;
  --secondary-color: #25d366;
  --bg-color: #f5f5f7;
  --text-color: #1c1c1e;
  --shadow-light: rgba(0,0,0,0.06);
  --shadow-medium: rgba(0,0,0,0.1);
  --shadow-dark: rgba(0,0,0,0.12);
  --radius: 15px;
}

/* ---------- RESET ---------- */
* { box-sizing: border-box; margin:0; padding:0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background:var(--bg-color); color:var(--text-color); line-height:1.5; }
a { text-decoration:none; color:inherit; }
button { cursor:pointer; outline:none; border:none; background:none; }

/* ---------- HEADER ---------- */
header { 
  background:var(--primary-color); color:#fff; padding:25px; text-align:center; font-size:28px; font-weight:700; position:sticky; top:0; z-index:100;
  box-shadow:0 4px 12px var(--shadow-medium);
}

/* ---------- CARRUSEL ---------- */
#carousel { max-width:1000px; margin:30px auto; position:relative; overflow:hidden; border-radius:20px; box-shadow:0 6px 18px var(--shadow-light); }
#carousel .slides { display:flex; transition:transform 0.5s ease-in-out; touch-action: pan-y; }
#carousel .slide { min-width:100%; position:relative; }
#carousel .slide img { width:100%; height:300px; object-fit:cover; border-radius:20px; background:#e0e0e0; }
#carousel .slide .caption { position:absolute; bottom:20px; left:20px; color:#fff; font-size:24px; font-weight:600; text-shadow: 2px 2px 6px rgba(0,0,0,0.6);}
#carousel .nav { position:absolute; top:50%; transform:translateY(-50%); width:100%; display:flex; justify-content:space-between; padding:0 15px; pointer-events:none; }
#carousel .nav span { pointer-events:auto; background:rgba(0,0,0,0.4); color:#fff; font-size:32px; padding:8px 12px; border-radius:50%; cursor:pointer; transition:0.3s; }
#carousel .nav span:hover { background:rgba(0,0,0,0.7);}
#carousel .dots { text-align:center; margin-top:10px; }
#carousel .dot { display:inline-block; width:12px; height:12px; border-radius:50%; background:#ccc; margin:0 5px; cursor:pointer; transition:0.3s; }
#carousel .dot.active { background:var(--primary-color); }

/* ---------- PESTAÑAS DE CATEGORÍAS ---------- */
#category-tabs { display:flex; justify-content:center; gap:15px; flex-wrap:wrap; margin:30px 0; }
#category-tabs button { padding:10px 20px; border-radius:12px; cursor:pointer; background:#e0e0e0; transition:0.3s; font-weight:600; }
#category-tabs button.active { background:var(--primary-color); color:#fff; }
#category-tabs button:focus { outline:2px solid var(--primary-color); outline-offset:2px; }

/* ---------- GRID DE PRODUCTOS ---------- */
.products { display:grid; grid-template-columns:repeat(auto-fit, minmax(240px, 1fr)); gap:30px; padding:0 20px; margin-bottom:60px; }

/* ---------- TARJETAS ---------- */
.card { background:#fff; border-radius:var(--radius); overflow:hidden; text-align:center; transition: transform 0.3s ease, box-shadow 0.3s ease; box-shadow:0 6px 18px var(--shadow-light); position:relative;}
.card:hover { transform:translateY(-7px); box-shadow:0 18px 30px var(--shadow-dark);}
.card img { width:100%; height:220px; object-fit:cover; transition: transform 0.6s ease; border-bottom:1px solid #e5e5ea; }
.card:hover img { transform:scale(1.08); }
.card h3 { margin:20px 10px 10px; font-size:20px; font-weight:500; }
.price { color:var(--primary-color); font-size:18px; margin-bottom:15px; font-weight:600; }
.whatsapp-btn { display:inline-block; margin-bottom:15px; padding:10px 22px; background:var(--secondary-color); color:#fff; font-weight:600; border-radius:12px; transition:0.3s;}
.whatsapp-btn:hover { background:#1ebe5d; }

/* ---------- LOGIN ---------- */
#login-panel { max-width:400px; margin:100px auto; background:#fff; padding:35px; border-radius:var(--radius); box-shadow:0 6px 18px var(--shadow-light); text-align:center; }
#login-panel input { width:calc(100% - 20px); padding:12px; margin-bottom:18px; border-radius:10px; border:1px solid #ccc; font-size:16px; }
#login-panel button { width:100%; padding:14px; background:var(--primary-color); color:#fff; font-size:16px; font-weight:600; border-radius:12px; transition:0.3s; }
#login-panel button:hover { background:#005bb5; }

/* ---------- PANEL ADMIN ---------- */
#admin-panel { display:none; background:#fff; border-radius:var(--radius); padding:30px; max-width:1000px; margin:50px auto; box-shadow:0 6px 18px var(--shadow-light);}
#admin-panel h2 { text-align:center; margin-bottom:10px; }
#admin-panel small { display:block; margin-bottom:15px; color:#666; text-align:center; }
#admin-panel input, #admin-panel select { width:calc(100% - 20px); padding:12px; margin-bottom:18px; border-radius:10px; border:1px solid #ccc; font-size:16px; }
#admin-panel button { width:100%; padding:14px; background:var(--primary-color); color:#fff; font-size:16px; font-weight:600; border-radius:12px; cursor:pointer; transition:0.3s; margin-bottom:12px; }
#admin-panel button:hover { background:#005bb5; }
#admin-panel button.logout { background:#ff3b30; }
.card-admin-btns { display:flex; justify-content:center; gap:10px; margin-bottom:15px; }
.card-admin-btns button { width:auto; padding:6px 12px; font-size:14px; }

/* ---------- FOOTER ---------- */
footer { text-align:center; padding:30px; background:#fff; margin-top:40px; box-shadow:0 -4px 12px var(--shadow-light); color:#666; font-size:14px; }

/* ---------- RESPONSIVE ---------- */
@media(max-width:600px){
  header { font-size:24px; padding:20px; }
  .card img { height:180px; }
  .whatsapp-btn { padding:8px 16px; font-size:14px; }
  #carousel .slide img { height:200px; }
  #carousel .caption { font-size:18px; }
  #category-tabs button { font-size:14px; padding:8px 14px; }
}

/* ---------- DRAGGING ---------- */
.dragging { opacity:0.5; }
</style>
</head>
<body>

<header>TIENDA TECH PREMIUM 5.0</header>

<main>
  <!-- CARRUSEL -->
  <section id="carousel" role="region" aria-label="Productos destacados">
    <div class="slides" id="carousel-slides"></div>
    <div class="nav">
      <span id="prev" aria-label="Anterior">&#10094;</span>
      <span id="next" aria-label="Siguiente">&#10095;</span>
    </div>
    <div class="dots" id="carousel-dots"></div>
  </section>

  <!-- PESTAÑAS DE CATEGORÍAS -->
  <nav id="category-tabs" aria-label="Categorías de productos"></nav>

  <!-- PRODUCTOS -->
  <section class="products" id="products-container" aria-label="Listado de productos"></section>
</main>

<!-- LOGIN -->
<section id="login-panel">
  <h2>Acceso Administrativo</h2>
  <input type="text" id="username" placeholder="Usuario">
  <input type="password" id="password" placeholder="Contraseña">
  <button onclick="login()">Ingresar</button>
</section>

<!-- PANEL ADMINISTRADOR -->
<section id="admin-panel">
  <h2>Panel de Administración</h2>
  <small>Agregar / Editar productos y crear nuevas categorías</small>
  <input type="text" id="new-category" placeholder="Nueva categoría">
  <button onclick="createCategory()">Crear categoría</button>
  <select id="category"></select>
  <input type="text" id="name" placeholder="Nombre del producto">
  <input type="text" id="price" placeholder="Precio (solo número)">
  <input type="text" id="image" placeholder="URL de la imagen">
  <button onclick="addOrUpdateProduct()">Agregar / Actualizar Producto</button>
  <button onclick="logout()" class="logout">Cerrar sesión</button>
</section>

<footer>© 2026 Tienda Tech Premium - Todos los derechos reservados</footer>

<script>
// ---------- DATOS INICIALES ----------
let defaultProducts = {
  apple:[{name:"AirPods OEM", price:280, image:"https://source.unsplash.com/400x400/?airpods"}],
  microsd:[{name:"Kingston 16GB", price:80, image:"https://source.unsplash.com/400x400/?microSD"}],
  usb:[{name:"Kingston USB 32GB", price:90, image:"https://source.unsplash.com/400x400/?usb,flashdrive"}]
};
let products = JSON.parse(localStorage.getItem('techProducts')) || defaultProducts;
let editMode={category:null,index:null};
let currentCategory=null;

// ---------- LOGIN / LOGOUT ----------
function login(){
  const user=document.getElementById('username').value.trim();
  const pass=document.getElementById('password').value.trim();
  if(user==="admin" && pass==="tech2026"){
    document.getElementById('login-panel').style.display="none"; 
    document.getElementById('admin-panel').style.display="block"; 
    populateCategoryOptions(); 
    renderProducts(currentCategory || Object.keys(products)[0]);
  } else { alert("Usuario o contraseña incorrectos"); }
}
function logout(){
  document.getElementById('login-panel').style.display="block"; 
  document.getElementById('admin-panel').style.display="none";
}

// ---------- CATEGORÍAS ----------
function renderCategoryTabs(){
  const tabs=document.getElementById('category-tabs');
  tabs.innerHTML='';
  Object.keys(products).forEach((cat,i)=>{
    const btn=document.createElement('button');
    btn.textContent=cat.toUpperCase();
    btn.className=(i===0)?'active':'';
    btn.addEventListener('click', ()=> selectCategory(cat));
    tabs.appendChild(btn);
  });
  currentCategory=currentCategory||Object.keys(products)[0];
}
function selectCategory(cat){
  currentCategory=cat;
  document.querySelectorAll('#category-tabs button').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('#category-tabs button').forEach(b=>{if(b.textContent.toLowerCase()===cat.toLowerCase()) b.classList.add('active');});
  renderProducts(cat);
}

// ---------- RENDER PRODUCTOS ----------
function renderProducts(category){
  const container=document.getElementById('products-container');
  container.innerHTML='';
  if(!category || !products[category]) return;
  products[category].forEach((p,index)=>{
    const card=document.createElement('div'); card.className='card';
    const img=document.createElement('img'); img.src=p.image; img.alt=p.name; img.loading='lazy';
    const h3=document.createElement('h3'); h3.textContent=p.name;
    const price=document.createElement('div'); price.className='price'; price.textContent='$'+p.price;
    const btn=document.createElement('a'); btn.className='whatsapp-btn'; 
    btn.href="https://wa.me/19563275461?text="+encodeURIComponent("Hola, quiero comprar "+p.name); 
    btn.target='_blank'; btn.textContent='Comprar por WhatsApp';
    const adminBtns=document.createElement('div'); adminBtns.className='card-admin-btns';
    const editBtn=document.createElement('button'); editBtn.textContent='Editar'; editBtn.onclick=()=>editProduct(category,index);
    const delBtn=document.createElement('button'); delBtn.textContent='Eliminar'; delBtn.style.background='#ff3b30'; delBtn.onclick=()=>deleteProduct(category,index);
    adminBtns.append(editBtn, delBtn);
    card.append(img,h3,price,btn,adminBtns);
    container.appendChild(card);
  });
  setupCarousel();
}

// ---------- CRUD ----------
function saveProducts(){ localStorage.setItem('techProducts', JSON.stringify(products)); }

function addOrUpdateProduct(){
  const category=document.getElementById('category').value;
  const name=document.getElementById('name').value.trim();
  const price=parseFloat(document.getElementById('price').value);
  const image=document.getElementById('image').value.trim();
  if(!category||!name||isNaN(price)||!image){alert("Rellena todos los campos correctamente"); return;}
  if(editMode.category!==null){
    products[editMode.category][editMode.index]={name,price,image};
    editMode={category:null,index:null};
    document.querySelector("#admin-panel button").innerText="Agregar / Actualizar Producto";
  } else {
    if(!products[category]) products[category]=[];
    products[category].push({name,price,image});
  }
  saveProducts(); populateCategoryOptions(); renderProducts(currentCategory);
  document.getElementById('category').value=''; document.getElementById('name').value=''; document.getElementById('price').value=''; document.getElementById('image').value='';
}

function editProduct(category,index){
  const p=products[category][index];
  document.getElementById('category').value=category;
  document.getElementById('name').value=p.name;
  document.getElementById('price').value=p.price;
  document.getElementById('image').value=p.image;
  editMode={category,index};
  document.querySelector("#admin-panel button").innerText="Actualizar Producto";
}

function deleteProduct(category,index){
  if(confirm("¿Deseas eliminar este producto?")){
    products[category].splice(index,1); saveProducts(); renderProducts(currentCategory);
  }
}

function populateCategoryOptions(){
  const select=document.getElementById('category');
  select.innerHTML='';
  Object.keys(products).forEach(cat=>{
    const opt=document.createElement('option'); opt.value=cat; opt.textContent=cat.toUpperCase(); select.appendChild(opt);
  });
  renderCategoryTabs();
}

function createCategory(){
  const newCat=document.getElementById('new-category').value.trim();
  if(!newCat){alert("Escribe un nombre de categoría"); return;}
  if(products[newCat]){alert("La categoría ya existe"); return;}
  products[newCat]=[];
  document.getElementById('new-category').value='';
  populateCategoryOptions(); saveProducts();
  alert("Categoría creada: "+newCat);
}

// ---------- CARRUSEL ----------
let currentSlide=0, slideInterval;
function setupCarousel(){
  const slides=document.getElementById('carousel-slides');
  const dots=document.getElementById('carousel-dots');
  slides.innerHTML=''; dots.innerHTML='';

  const destacados=[];
  for(let cat in products){ if(products[cat].length>0) destacados.push(products[cat][0]); }
  if(!destacados.length) return;

  destacados.forEach((p,i)=>{
    const slide=document.createElement('div'); slide.className='slide';
    const img=document.createElement('img'); img.src=p.image; img.alt=p.name; img.loading='lazy';
    const cap=document.createElement('div'); cap.className='caption'; cap.textContent=p.name;
    slide.append(img,cap); slides.appendChild(slide);
    const dot=document.createElement('span'); dot.className='dot'; if(i===0) dot.classList.add('active'); dot.onclick=()=>showSlide(i);
    dots.appendChild(dot);
  });

  currentSlide=0; slides.style.transform=`translateX(0)`;
  if(slideInterval) clearInterval(slideInterval);
  slideInterval=setInterval(nextSlide,5000);

  document.getElementById('prev').onclick=prevSlide;
  document.getElementById('next').onclick=nextSlide;

  // Swipe móvil
  let startX=0;
  slides.addEventListener('touchstart', e=>{ startX=e.touches[0].clientX; });
  slides.addEventListener('touchend', e=>{
    const endX=e.changedTouches[0].clientX;
    if(endX-startX>50) prevSlide();
    if(startX-endX>50) nextSlide();
  });
}

function showSlide(i){
  const slides=document.getElementById('carousel-slides');
  const dots=document
